name: Deploy to GitHub Pages

# Build the Vite site and publish it to GitHub Pages on every push to main.
# Uses the official Pages deployment flow (no gh-pages branch to maintain).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy step needs to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-flight deploy instead of queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
